services:
  db:
    image: postgres
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: local
    volumes:
      - pgdata:/var/lib/postgresql

  web:
    build: .
    ports:
      - 3000:3000
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://root:mysecretpassword@db:5432/local
      ORIGIN: http://localhost:3000
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
