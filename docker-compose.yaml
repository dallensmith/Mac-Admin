services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    restart: unless-stopped
    ports:
      - 8090:8090
    volumes:
      - pbdata:/pb/pb_data
    environment:
      PB_ADMIN_EMAIL: admin@local.dev
      PB_ADMIN_PASSWORD: 12345678
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - 3000:3000
    env_file:
      - .env
    environment:
      POCKETBASE_URL: http://pocketbase:8090
      ORIGIN: http://localhost:3000
      POCKETBASE_SUPERUSER_EMAIL: admin@local.dev
      POCKETBASE_SUPERUSER_PASSWORD: 12345678
    depends_on:
      pocketbase:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pbdata:
