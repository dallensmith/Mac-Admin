name: CI

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, dev]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'svelte.config.js'
      - 'vite.config.ts'
      - 'playwright.config.ts'
      - '.github/workflows/ci-web.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'svelte.config.js'
      - 'vite.config.ts'
      - 'playwright.config.ts'
      - '.github/workflows/ci-web.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '22.x'

jobs:
  lint-and-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Svelte check
        run: npm run check

  build-and-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    needs: lint-and-check

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create stub .env for build
        run: |
          cat <<'EOF' > .env
          POCKETBASE_URL=http://localhost:8090
          PUBLIC_POCKETBASE_URL=http://localhost:8090
          POCKETBASE_SUPERUSER_EMAIL=ci@example.com
          POCKETBASE_SUPERUSER_PASSWORD=ci-password
          ORIGIN=http://localhost:3000
          DISCORD_CLIENT_ID=ci
          DISCORD_CLIENT_SECRET=ci
          DISCORD_BOT_TOKEN=ci
          DISCORD_GUILD_ID=ci
          ADMIN_DISCORD_USER_IDS=
          TMDB_API_KEY=ci
          OMDB_API_KEY=ci
          BRAVE_API_KEY=ci
          BADMOVIES_PGHOST=localhost
          BADMOVIES_PGPORT=5432
          BADMOVIES_PGDATABASE=ci
          BADMOVIES_PGUSER=ci
          BADMOVIES_PGPASSWORD=ci
          BADMOVIES_PGSSL=false
          EOF

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit -- --run --coverage

      - name: Write coverage summary
        if: always()
        run: |
          SUMMARY="coverage/coverage-summary.json"
          if [ ! -f "$SUMMARY" ]; then
            echo '### Test Coverage' >> $GITHUB_STEP_SUMMARY
            echo 'Coverage report not generated.' >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          LINES=$(jq '.total.lines.pct' $SUMMARY)
          STMTS=$(jq '.total.statements.pct' $SUMMARY)
          FUNCS=$(jq '.total.functions.pct' $SUMMARY)
          BRCHS=$(jq '.total.branches.pct' $SUMMARY)
          LINES_COV=$(jq '.total.lines.covered' $SUMMARY)
          LINES_TOT=$(jq '.total.lines.total' $SUMMARY)
          FUNC_COV=$(jq '.total.functions.covered' $SUMMARY)
          FUNC_TOT=$(jq '.total.functions.total' $SUMMARY)
          badge() { pct=$1; if (( $(echo "$pct >= 90" | bc -l) )); then echo "🟢"; elif (( $(echo "$pct >= 70" | bc -l) )); then echo "🟡"; else echo "🔴"; fi; }
          echo "### Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Coverage | Detail |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| $(badge $LINES) Lines | ${LINES}% | ${LINES_COV} / ${LINES_TOT} |" >> $GITHUB_STEP_SUMMARY
          echo "| $(badge $STMTS) Statements | ${STMTS}% | — |" >> $GITHUB_STEP_SUMMARY
          echo "| $(badge $FUNCS) Functions | ${FUNCS}% | ${FUNC_COV} / ${FUNC_TOT} |" >> $GITHUB_STEP_SUMMARY
          echo "| $(badge $BRCHS) Branches | ${BRCHS}% | — |" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  tag:
    name: Tag Release
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version tag
        id: version
        run: |
          COUNT=$(git rev-list --count HEAD)
          TAG="v0.1.${COUNT}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Tagging as $TAG"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}
